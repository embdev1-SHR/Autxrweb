<!doctype html>
<html lang="en">
  <head>
    <title>Autxrweb Portal</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body {
        margin: 0;
        background-color: #1a1a2e;
        overflow: hidden;
        color: white;
        font-family: sans-serif;
      }
      /* Fallback 2D UI for users not in XR */
      #fallback-ui {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        background: rgba(0, 0, 0, 0.7);
        padding: 2rem;
        border-radius: 12px;
        z-index: 10;
        pointer-events: none; /* Let clicks pass through if needed, though they shouldn't */
      }
      #fallback-ui h1 { margin-top: 0; }
      #fallback-ui p { color: #aaa; }
    </style>
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "@dimforge/rapier3d-simd-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-simd-compat@0.19.2/rapier.mjs",
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "../build/xrblocks.js",
          "xrblocks/addons/": "../build/addons/"
        }
      }
    </script>
  </head>
  <body>
    <div id="fallback-ui">
      <h1>Autxrweb XR Portal</h1>
      <p>Enter VR / AR to view the spatial menu.</p>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      class MenuApp extends xb.App {
        constructor() {
          super();
        }

        start() {
          this.createFixedMenu();
          // Hiding fallback UI once started
          const fallback = document.getElementById('fallback-ui');
          if(fallback) fallback.style.display = 'none';
        }

        createFixedMenu() {
          const panel = new xb.SpatialPanel({ 
            width: 1.6, 
            height: 1.0, 
            backgroundColor: '#1a1a2edd', 
            useDefaultPosition: false 
          });
          // Fixed menu in center, comfortable viewing distance
          panel.position.set(0, 1.5, -2.0);
          
          const grid = panel.addGrid();
          grid.addRow({weight: 0.2}).addText({ text: "EXPERIENCES", fontSize: 0.12, fontColor: '#ffffff' });

          const row1 = grid.addRow({weight: 0.4});
          const row2 = grid.addRow({weight: 0.4});

          // Row 1
          const seasonsCol = row1.addCol({weight: 0.25});
          seasonsCol.addIconButton({ text: 'wb_sunny', fontSize: 0.3, backgroundColor: '#f1ca0f' }).onTriggered = () => { window.location.href = 'Seasons/Seasons.html'; };
          
          const voiceCol = row1.addCol({weight: 0.25});
          voiceCol.addIconButton({ text: 'mic', fontSize: 0.3, backgroundColor: '#3498db' }).onTriggered = () => { window.location.href = 'Voice/Voice.html'; };

          const balloonCol = row1.addCol({weight: 0.25});
          balloonCol.addIconButton({ text: 'bubble_chart', fontSize: 0.3, backgroundColor: '#e74c3c' }).onTriggered = () => { window.location.href = 'balloonpop/index.html'; };

          const ballpitCol = row1.addCol({weight: 0.25});
          ballpitCol.addIconButton({ text: 'sports_baseball', fontSize: 0.3, backgroundColor: '#9b59b6' }).onTriggered = () => { window.location.href = 'ballpit/index.html'; };

          // Row 2
          const paintCol = row2.addCol({weight: 0.33});
          paintCol.addIconButton({ text: 'format_paint', fontSize: 0.3, backgroundColor: '#2ecc71' }).onTriggered = () => { window.location.href = 'paint/index.html'; };

          const rainCol = row2.addCol({weight: 0.33});
          rainCol.addIconButton({ text: 'water_drop', fontSize: 0.3, backgroundColor: '#82ccdd' }).onTriggered = () => { window.location.href = 'rain/index.html'; };

          const splashCol = row2.addCol({weight: 0.33});
          splashCol.addIconButton({ text: 'brush', fontSize: 0.3, backgroundColor: '#ff9f43' }).onTriggered = () => { window.location.href = 'splash/index.html'; };

          this.add(panel);
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        let options = new xb.Options();
        options.enableUI();
        
        // Remove cube logic: We specifically are omitting any add(new THREE.Mesh(... BoxGeometry ...)) 
        // that used to exist here. The MenuApp only adds the SpatialPanel.

        xb.add(new MenuApp());
        xb.init(options);
      });
    </script>
  </body>
</html>
